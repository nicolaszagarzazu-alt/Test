<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Número al azar</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1419;
      --surface: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-hover: #5ba3ff;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f6f9;
        --surface: #fff;
        --text: #1a1f26;
        --muted: #5c6b7a;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
      }
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      text-align: center;
      padding: 2rem;
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      max-width: 22rem;
      width: calc(100% - 2rem);
    }
    h1 {
      font-size: 1.125rem;
      font-weight: 600;
      margin: 0 0 1.5rem;
      color: var(--muted);
    }
    #resultado {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      min-height: 4rem;
      line-height: 1;
      margin-bottom: 1.5rem;
      font-variant-numeric: tabular-nums;
    }
    #resultado.placeholder {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.4;
    }
    button {
      appearance: none;
      border: none;
      border-radius: 10px;
      padding: 0.875rem 1.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      width: 100%;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    button:hover {
      background: var(--accent-hover);
    }
    button:active {
      transform: scale(0.98);
    }
    button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Número al azar</h1>
    <div id="resultado" class="placeholder" aria-live="polite">Tocá el botón</div>
    <button type="button" id="btn">Generar</button>
  </main>
  <script>
    const MIN = 1;
    const MAX = 100;

    const resultado = document.getElementById("resultado");
    const btn = document.getElementById("btn");

    function aleatorio(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    btn.addEventListener("click", () => {
      resultado.classList.remove("placeholder");
      resultado.textContent = String(aleatorio(MIN, MAX));
    });
  </script>
</body>
</html>
